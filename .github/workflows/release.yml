name: Release (macOS)

# Tag a version (e.g. `git tag v0.2.0 && git push --tags`) to build a signed,
# notarized, drag-to-install DMG and publish a GitHub Release.
#
# Until the signing secrets below exist, this falls back to a self-signed,
# un-notarized DMG (recipients right-click → Open). Add these repo secrets to
# turn on real distribution (see docs/STATUS.md):
#   MAC_CERT_P12_BASE64        Developer ID Application cert (.p12), base64
#   MAC_CERT_PASSWORD          password for the .p12
#   APPLE_ID / APPLE_TEAM_ID / APPLE_APP_PASSWORD   for notarytool
#   SPARKLE_ED_PRIVATE_KEY     EdDSA key for signing the appcast (optional)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Import Developer ID cert (if present)
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' }}
        env:
          P12: ${{ secrets.MAC_CERT_P12_BASE64 }}
          P12_PW: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$P12" | base64 --decode > cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain
          echo "SIGN_ID=Developer ID Application" >> "$GITHUB_ENV"

      - name: Build
        run: |
          xcodegen generate
          xcodebuild -project Voicely.xcodeproj -scheme Voicely -configuration Release \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build
          APP=build/Build/Products/Release/Voicely.app
          echo "APP=$APP" >> "$GITHUB_ENV"

      - name: Sign (Developer ID, hardened runtime)
        if: ${{ env.SIGN_ID != '' }}
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "$SIGN_ID" --entitlements App/Voicely.entitlements "$APP"

      - name: Notarize + staple
        if: ${{ secrets.APPLE_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent "$APP" notarize.zip
          xcrun notarytool submit notarize.zip --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$APP"

      - name: Make DMG
        run: |
          mkdir -p dist
          create-dmg --volname Voicely --window-size 540 380 --icon-size 110 \
            --icon Voicely.app 150 185 --app-drop-link 390 185 \
            --hide-extension Voicely.app dist/Voicely.dmg "$APP" || \
          hdiutil create -volname Voicely -srcfolder "$APP" -ov -format UDZO dist/Voicely.dmg

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Voicely.dmg
          generate_release_notes: true

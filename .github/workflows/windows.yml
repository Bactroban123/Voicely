name: Release (Windows)

# Builds the Windows installer (.exe) on a GitHub-hosted Windows runner.
# Trigger by pushing a tag like `v0.2.0` (same tag as the macOS release),
# or run manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt pyinstaller pytest

      - name: Unit tests (core logic on Windows)
        run: python -m pytest tests -q

      - name: Import smoke (all runtime deps load on Windows)
        run: python tests/import_smoke.py

      - name: Generate icon
        run: python app/gen_icon.py

      - name: Build executable (PyInstaller)
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name Voicely
          --icon app/icon.ico
          --collect-all sounddevice
          --collect-all pystray
          --collect-all pyperclip
          --hidden-import pystray._win32
          --hidden-import PIL.ImageDraw
          app/main.py

      - name: Smoke test the built exe (boots without crashing on Windows)
        shell: pwsh
        run: |
          $dir = "$env:APPDATA\Voicely"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          '{"openrouter_key":"sk-or-smoketest"}' | Set-Content -Encoding utf8 "$dir\config.json"
          Remove-Item "$dir\log.txt" -ErrorAction SilentlyContinue
          $env:VOICELY_SMOKE = "1"
          $p = Start-Process -FilePath "dist\Voicely.exe" -PassThru -Wait
          Write-Host "exit code: $($p.ExitCode)"
          $log = ""
          if (Test-Path "$dir\log.txt") { $log = Get-Content "$dir\log.txt" -Raw }
          Write-Host "---- app log ----"
          Write-Host $log
          if ($p.ExitCode -ne 0) { Write-Error "Voicely.exe exited non-zero"; exit 1 }
          if ($log -notmatch "SMOKE OK") { Write-Error "Voicely.exe did not reach SMOKE OK (startup crash)"; exit 1 }
          Write-Host "SMOKE PASSED: the frozen app boots and wires up on Windows."

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoicelySetup
          path: windows/installer_out/VoicelySetup.exe

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: windows/installer_out/VoicelySetup.exe
          body: |
            **Voicely for Windows** — press **Ctrl+Alt+Space**, speak, press again. Text types itself.

            **Install:** download `VoicelySetup.exe` and run it. If Windows SmartScreen warns,
            click **More info → Run anyway** (it's unsigned — expected for now). Paste your
            OpenRouter API key on first launch. That's it.
